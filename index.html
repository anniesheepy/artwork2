<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Approval System | Admart Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. 門禁視窗專屬樣式 - 使用 Admart 綠色色調 */
        #gatekeeper {
            position: fixed;
            inset: 0;
            background: #f8fafc; /* 淺灰色背景 */
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            max-width: 400px;
            width: 90%;
            border-top: 6px solid #22c55e; /* Admart 綠色條 */
            text-align: center;
        }

        .admart-logo {
            width: 180px;
            margin: 0 auto 1.5rem;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }

        .btn-verify {
            width: 100%;
            background-color: #22c55e;
            color: white;
            padding: 0.8rem;
            border-radius: 0.5rem;
            font-weight: 700;
            margin-top: 1.5rem;
            transition: background 0.3s;
        }

        .btn-verify:hover {
            background-color: #16a34a;
        }

        /* 2. 原始內容控制：驗證前隱藏 */
        #main-content { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="gatekeeper">
        <div class="auth-card">
            <img src="https://admartproducts.com/content/webimg/admart_new_aminate_wbg_256.gif" alt="Admart Logo" class="admart-logo">
            
            <h2 class="text-xl font-bold text-gray-800">Security Access</h2>
            <p class="text-gray-500 text-sm mt-2">To view your artwork proof, please enter the order details found in your email.</p>
            
            <div class="mt-6 text-left">
                <label class="text-xs font-bold text-gray-600 uppercase">PO Number</label>
                <input type="text" id="auth_po" class="input-field" placeholder="e.g. 105824">
            </div>
            
            <div class="mt-4 text-left">
                <label class="text-xs font-bold text-gray-600 uppercase">Job Number</label>
                <input type="text" id="auth_job" class="input-field" placeholder="e.g. 737989">
            </div>

            <button onclick="verifyAccess()" id="verify-btn" class="btn-verify">
                Unlock Artwork
            </button>
            
            <p id="error-msg" class="text-red-500 text-sm mt-4 hidden font-medium">
                Invalid details. Please try again.
            </p>
        </div>
    </div>

    <div id="main-content" class="container mx-auto py-10 px-4">
        <div class="bg-white shadow-lg rounded-lg overflow-hidden">
            <div class="bg-green-600 p-4 text-white">
                <h2 class="text-xl font-bold">Artwork Approval: <span id="display-pid"></span></h2>
            </div>
            
            <div class="p-6">
                <div class="mb-8 border-4 border-dashed border-gray-200 rounded-lg p-2 text-center">
                    <img id="artwork-img" src="" alt="Artwork Proof" class="max-w-full mx-auto shadow-sm">
                </div>

                <form id="approval-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 font-bold">Your Name</label>
                            <input type="text" id="signer_name" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50" readonly>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 font-bold">Email Address</label>
                            <input type="email" id="signer_email" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50" readonly>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 font-bold mb-2">Decision</label>
                        <div class="flex gap-4">
                            <label class="flex-1 border p-4 rounded-lg cursor-pointer hover:bg-green-50 transition border-green-200">
                                <input type="radio" name="status" value="Approved" checked class="mr-2"> 
                                <span class="font-bold text-green-700">Approve</span>
                            </label>
                            <label class="flex-1 border p-4 rounded-lg cursor-pointer hover:bg-red-50 transition border-red-200">
                                <input type="radio" name="status" value="Changes Requested" class="mr-2"> 
                                <span class="font-bold text-red-700">Request Changes</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 font-bold">Comments / Change Details</label>
                        <textarea id="comments" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition shadow-lg">
                        Submit My Response
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pid = urlParams.get('pid');

        // 核心驗證邏輯
        async function verifyAccess() {
            const po = document.getElementById('auth_po').value;
            const job = document.getElementById('auth_job').value;
            const btn = document.getElementById('verify-btn');
            const errMsg = document.getElementById('error-msg');

            if (!po || !job) {
                alert("Please enter both PO and Job numbers.");
                return;
            }

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // 這裡請換成你新的 n8n Webhook URL (POST 方法)
                const response = await fetch('https://n8n.admartproducts.com/webhook/verify-artwork-access', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pid, po, job })
                });

                const result = await response.json();

                if (result.valid) {
                    // 1. 移除門禁視窗
                    document.getElementById('gatekeeper').style.display = 'none';
                    // 2. 顯示原本內容
                    document.getElementById('main-content').style.display = 'block';
                    
                    // 3. 從 n8n 帶回真實資料填充
                    document.getElementById('display-pid').innerText = pid;
                    document.getElementById('artwork-img').src = result.data.file_url;
                    document.getElementById('signer_name').value = result.data.name;
                    document.getElementById('signer_email').value = result.data.email;
                } else {
                    errMsg.classList.remove('hidden');
                    btn.innerText = "Unlock Artwork";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                alert("Verification service unavailable. Please check n8n workflow.");
                btn.disabled = false;
            }
        }

        // 原始提交邏輯
        document.getElementById('approval-form').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                pid: pid,
                name: document.getElementById('signer_name').value,
                email: document.getElementById('signer_email').value,
                status: document.querySelector('input[name="status"]:checked').value,
                change_details: document.getElementById('comments').value
            };

            const res = await fetch('https://n8n.admartproducts.com/webhook/artwork-approval-submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('Success! Your response has been sent to Admart.');
            } else {
                alert('Submission failed.');
            }
        };
    </script>
</body>
</html>
