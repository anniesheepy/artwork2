<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Approval System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 門禁遮罩樣式 */
        #gatekeeper {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #main-content { display: none; } /* 預設隱藏內容 */
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="gatekeeper">
        <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full border border-gray-200">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Security Verification</h1>
                <p class="text-gray-600 mt-2">Please enter the details provided in your email to view the artwork.</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">PO Number</label>
                    <input type="text" id="auth_po" class="mt-1 block w-full px-4 py-2 border rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" placeholder="e.g. 105824">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Job Number</label>
                    <input type="text" id="auth_job" class="mt-1 block w-full px-4 py-2 border rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" placeholder="e.g. 737989">
                </div>
                <button onclick="verifyAccess()" id="verify-btn" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition font-semibold">
                    View Artwork Proof
                </button>
                <p id="error-msg" class="text-red-500 text-sm text-center hidden">Invalid PO# or Job#. Please check your email.</p>
            </div>
        </div>
    </div>

    <div id="main-content" class="container mx-auto py-10 px-4">
        <div class="bg-white shadow-lg rounded-lg overflow-hidden">
            <div class="bg-blue-600 p-4 text-white">
                <h2 class="text-xl font-bold">Artwork Approval: <span id="display-pid"></span></h2>
            </div>
            
            <div class="p-6">
                <div class="mb-8 border-4 border-dashed border-gray-200 rounded-lg p-2 text-center">
                    <p class="text-gray-400 mb-2">Artwork Preview</p>
                    <img id="artwork-img" src="" alt="Artwork Proof" class="max-w-full mx-auto shadow-sm">
                </div>

                <form id="approval-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Your Name</label>
                            <input type="text" id="signer_name" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50" readonly>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Email Address</label>
                            <input type="email" id="signer_email" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50" readonly>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 font-bold mb-2">Decision</label>
                        <div class="flex gap-4">
                            <label class="flex-1 border p-4 rounded-lg cursor-pointer hover:bg-green-50 transition">
                                <input type="radio" name="status" value="Approved" checked class="mr-2"> 
                                <span class="font-bold text-green-700">Approve</span>
                            </label>
                            <label class="flex-1 border p-4 rounded-lg cursor-pointer hover:bg-red-50 transition">
                                <input type="radio" name="status" value="Changes Requested" class="mr-2"> 
                                <span class="font-bold text-red-700">Request Changes</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Comments / Change Details</label>
                        <textarea id="comments" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition shadow-lg">
                        Submit Response
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pid = urlParams.get('pid');

        // 1. 驗證訪問權限
        async function verifyAccess() {
            const po = document.getElementById('auth_po').value;
            const job = document.getElementById('auth_job').value;
            const btn = document.getElementById('verify-btn');
            const errMsg = document.getElementById('error-msg');

            if (!po || !job) return alert("Please enter both PO and Job numbers.");

            btn.innerText = "Verifying...";
            btn.disabled = true;

            try {
                const response = await fetch('https://n8n.admartproducts.com/webhook/verify-artwork-access', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pid, po, job })
                });

                const result = await response.json();

                if (result.valid) {
                    // 驗證成功，填充資料
                    document.getElementById('gatekeeper').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    
                    // 填充從 n8n 抓回來的資料
                    document.getElementById('display-pid').innerText = pid;
                    document.getElementById('artwork-img').src = result.data.file_url;
                    document.getElementById('signer_name').value = result.data.name;
                    document.getElementById('signer_email').value = result.data.email;
                } else {
                    errMsg.classList.remove('hidden');
                    btn.innerText = "View Artwork Proof";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Server error. Please try again later.");
                btn.disabled = false;
            }
        }

        // 2. 提交審核結果 (原本的邏輯)
        document.getElementById('approval-form').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                pid: pid,
                name: document.getElementById('signer_name').value,
                email: document.getElementById('signer_email').value,
                status: document.querySelector('input[name="status"]:checked').value,
                change_details: document.getElementById('comments').value
            };

            const res = await fetch('https://n8n.admartproducts.com/webhook/artwork-approval-submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('Thank you! Your response has been submitted.');
                window.close();
            } else {
                alert('Submission failed. Please contact support.');
            }
        };
    </script>
</body>
</html>
